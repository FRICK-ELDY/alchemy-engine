# app クレートのビルド・リリース用エイリアス
# app は app / client_desktop の 2 バイナリを生成。
# 使用例:
#   cargo client-desktop           # デバッグビルド（client_desktop バイナリ）
#   cargo client-desktop --release # リリースビルド
#   cargo client-run-desktop       # 実行

[alias]
client-desktop  = "build -p app --bin client_desktop"
client-release-desktop  = "build -p app --bin client_desktop --release"

# 実行（client_desktop バイナリ）
client-run-desktop = "run -p app --bin client_desktop"
