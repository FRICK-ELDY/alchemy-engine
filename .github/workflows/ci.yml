name: CI
on:
  push:
    branches: ["**"]
  pull_request:

# 複合アクションと各ジョブで共通参照（バージョンはここだけ更新）
env:
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "28"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # [A] Rust: フォーマット + Clippy（警告ゼロ強制）
  # ─────────────────────────────────────────────
  rust-check:
    name: "Rust — fmt & clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/alchemy-ci-setup
        with:
          protoc-source: apt
          rust-components: "rustfmt, clippy"

      - name: cargo fmt
        run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check

      - name: cargo clippy
        run: >
          cargo clippy --manifest-path rust/Cargo.toml --workspace
          --exclude launcher
          -- -D warnings

  # ─────────────────────────────────────────────
  # [B] Rust: ユニットテスト（nif/physics）
  # ─────────────────────────────────────────────
  rust-test:
    name: "Rust — unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/alchemy-ci-setup
        with:
          protoc-source: apt

      - name: cargo test (nif/physics)
        run: cargo test --manifest-path rust/Cargo.toml -p nif

  # ─────────────────────────────────────────────
  # Protobuf: Elixir 生成物と proto の整合（生成後 mix format してから diff）
  # ─────────────────────────────────────────────
  proto-verify:
    name: "Protobuf — codegen up to date"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/alchemy-ci-setup
        with:
          protoc-source: arduino
          with-beam: "true"
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: proto-verify-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            proto-verify-${{ runner.os }}-

      - run: mix deps.get

      - name: Install protoc-gen-elixir
        run: mix escript.install hex protobuf --force

      - name: Verify protobuf codegen is up to date
        run: |
          export PATH="$HOME/.mix/escripts:$PATH"
          mix alchemy.gen.proto
          mix format "apps/network/lib/network/proto/generated/**/*.ex"
          git diff --exit-code -- apps/network/lib/network/proto/generated/

  # ─────────────────────────────────────────────
  # [C] Elixir: コンパイル + フォーマット + Credo
  # ─────────────────────────────────────────────
  elixir-check:
    name: "Elixir — compile & credo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/alchemy-ci-setup
        with:
          protoc-source: arduino
          with-beam: "true"
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-check-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-check-${{ runner.os }}-

      - run: mix deps.get
        env:
          MIX_ENV: test
      - run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test
      - run: mix format --check-formatted
        env:
          MIX_ENV: test
      - run: mix credo --strict
        env:
          MIX_ENV: test

  # ─────────────────────────────────────────────
  # [D] Elixir: NIF 込み mix test
  # ─────────────────────────────────────────────
  elixir-test:
    name: "Elixir — mix test (with NIF)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/alchemy-ci-setup
        with:
          protoc-source: arduino
          with-beam: "true"
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: deps
          key: elixir-test-deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-test-deps-${{ runner.os }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test
      - run: mix test
        env:
          MIX_ENV: test

  # ─────────────────────────────────────────────
  # [E] ベンチマーク回帰（main の push のみ）
  # ─────────────────────────────────────────────
  bench-regression:
    name: "Rust — bench regression"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/alchemy-ci-setup
        with:
          protoc-source: apt

      - name: cargo bench
        run: >
          cargo bench
          --manifest-path rust/Cargo.toml
          -p nif
          -- --output-format bencher
          | tee bench_output.txt

      - uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench_output.txt
          fail-on-alert: true
          alert-threshold: "110%"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
